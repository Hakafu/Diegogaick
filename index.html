<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfólio Premium</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      background:#050505;
      color:white;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      min-height:100vh;
      padding:30px 15px;
    }

    .card{
      width:100%;
      max-width:420px;
      background:linear-gradient(180deg,#0f0f0f 0%,#080808 100%);
      border-radius:28px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,0.05);
      box-shadow:
        0 0 40px rgba(0,0,0,0.8),
        0 0 0 1px rgba(255,255,255,0.02);
    }

    .hero{
      position:relative;
      padding:30px 25px 20px;
      background:
      linear-gradient(to bottom,
      rgba(0,0,0,0.2),
      rgba(0,0,0,0.85)),
      url('https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=1200&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:15px;
    }
      
    .name h1{
      font-size:36px;
      line-height:1;
      font-weight:800;
      margin-bottom:10px;
    }

    .username{
      color:#b8b8b8;
      font-size:13px;
      margin-bottom:10px;
      left:70px;
      position:relative;
    }

    .badges{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .badge{
      background:#121212;
      border:1px solid rgba(255,255,255,0.08);
      color:#d7d7d7;
      font-size:11px;
      padding:6px 10px;
      border-radius:10px;      
      font-weight:600;
      left: 210px;
      bottom: 2px;
      position:relative;
    }
      
    .profile-img{
      width:130px;
      height:130px;
      top: -20px;
      border-radius:20px;
      overflow:hidden;
      border:2px solid rgba(255,255,255,0.15);
      flex-shrink:0;
      position: relative;
    }

    .profile-img img{
      width:100%;
      height:100%;      
      object-fit:cover;
    }

    .actions{
      display:flex;
      justify-content:center;
      gap:18px;
      margin-top:30px;
    }

    .action{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      font-size:11px;
      color:#bfbfbf;
    }

    .circle{
      width:45px;
      height:45px;
      border-radius:50%;
      background:#121212;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,0.06);
      transition:0.3s;
      cursor:pointer;
    }

    .circle:hover{
      transform:translateY(-4px);
      background:#1c1c1c;
    }

    .circle i{
      font-size:18px;
    }

    .content{
      padding:25px;
    }

    .section-title{
      text-align:center;
      color:#6d6d6d;
      letter-spacing:3px;
      font-size:11px;
      margin-bottom:18px;
    }

    .description{
      text-align:center;
      color:#d4d4d4;
      line-height:1.7;
      font-size:14px;
      margin-bottom:28px;
    }

    .simulator{
      background:#111;
      border-radius:22px;
      padding:22px;
      border:1px solid rgba(255,255,255,0.06);
      box-shadow:
        inset 0 0 20px rgba(255,255,255,0.02),
        0 0 30px rgba(0,0,0,0.6);
    }

    .sim-title{
      font-size:15px;
      font-weight:700;
      margin-bottom:18px;
    }

    select,
    input, textarea{
      width:100%;
      background:#1a1a1a;
      border:none;
      border-radius:14px;
      padding:14px;
      color:white;
      margin-bottom:14px;
      outline:none;
      font-size:14px;
    }

    .range{
      width:100%;
      margin:15px 0 20px;
    }

    .result-label{
      text-align:center;
      color:#7f7f7f;
      font-size:11px;
      letter-spacing:2px;
      margin-bottom:10px;
    }

    .result{
      text-align:center;
      color:#00ff9d;
      font-size:42px;
      font-weight:800;
      margin-bottom:22px;
      text-shadow:0 0 20px rgba(0,255,157,0.3);
    }

    .btn{
      width:100%;
      border:none;
      border-radius:16px;
      padding:16px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:0.3s;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }

    .btn-enviar{
      background:#3f04e0;
      color:white;
      margin-top:16px;
    }

    .btn-enviar:hover{
      background:#e9e9eb;
      transform:translateY(-2px);
      color:#000;
    }

    .btn-whatsapp{
      background:#10b75a;
      color:white;
      margin-top:16px;
    }

    .btn-whatsapp:hover{
      background:#0dd168;
      transform:translateY(-2px);
    }
    
    .btn-instagram{
      background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
      color:white;
      margin-top:16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-instagram:hover{
      background:#e9f1ed;
      transform:translateY(-2px);
      color:#000;
    }

    .btn-dark{
      background:#1c1c1c;
      color:white;
      border:1px solid rgba(255,255,255,0.05);
    }

    .btn-dark:hover{
      background:#262626;
    }

    @media(max-width:600px){
      .name h1{
        font-size:30px;
      }
      .profile-img{
        width:120px;
        height:120px;
      }
      .result{
        font-size:34px;
      }
    }

    .partner{
      margin-top:35px;
      text-align:center;
    }

    .partner-line{
      width:100%;
      height:1px;
      background:rgba(255,255,255,0.12);
      margin-bottom:18px;
    }

    .partner-text{
      color:#8f8f8f;
      font-size:12px;
      letter-spacing:3px;
      margin-bottom:18px;
    }

    .partner-logo{
      width: 200px;
      max-width:20%;
      object-fit:contain;
      opacity:0.95;
      transition:0.3s;
    }

    .partner-logo:hover{
      transform:scale(1.03);
    }
  </style>

  <script src="https://kit.fontawesome.com/7d2c4b8d8b.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="card">
    <div class="hero">
      <div class="top">
        <div class="name">
          <h1>Diego<br>Gaick</h1>
          <div class="username">
            CONSULTOR <br>@diego_gaick            
          </div>
          <div class="badges">
            <div class="badge">IMÓVEL</div>
            <div class="badge">VEÍCULOS </div>
          </div>
        </div>
        <div class="profile-img">
           <img src="foto/foto 2.jpeg"Foto de perfil Diego Gaick">
        </div>
      </div>
    </div>

    <div class="content">
      <div class="section-title">SOBRE MIM</div>
      <div class="description">
        Planejamento financeiro com segurança.
        Descubra como multiplicar seu patrimônio
        de forma inteligente.
      </div>

      <div class="simulator">
        <div class="sim-title">Simule seu consórcio com a gente</div>

        <form action="https://api.sheetmonkey.io/form/3ngzGxqAUTDJCuYMKta9BU" method="POST">
          <label>Digite seu Nome:</label>
          <input type="text" name="nome" required>
          
          <label>Digite seu E-mail:</label>
          <input type="email" name="email" required>
          
          <label>Digite seu Telefone:</label>
          <input type="tel" name="telefone" required>   
          
          <label>Digite sua Mensagem:</label>
          <textarea name="mensagem" rows="4" required></textarea>
          
          <button type="submit" class="btn btn-enviar">Enviar</button>
        </form>        
      </div>

      <!-- Botão WhatsApp -->
      <a href="https://wa.me/5569993940281" target="_blank" class="btn btn-whatsapp">
        <i class="fab fa-whatsapp"></i> Falar no WhatsApp
      </a>

      <!-- Botão Instagram CORRIGIDO -->
      <a href="https://www.instagram.com/diego_gaick/" target="_blank" class="btn btn-instagram">
        <i class="fab fa-instagram"></i> 
        Acessar Instagram
        <!-- Se quiser usar a imagem ao invés do ícone, é só usar essa linha abaixo e apagar a de cima:
        <img src="diego/foto/foto-instagram.png" alt="Instagram" style="width: 20px; height: 20px;">
        -->
      </a>

      <div class="partner">
        <div class="partner-line"></div>
        <div class="partner-text"></div>
        <img src="logo/foto-ademicon.png" alt="Ademicon" class="partner-logo">
      </div>
    </div>
  </div>
</body>
</html>
